- name: Build Dynamic Pod Inventory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Get running pods in namespace
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: rhn-support-mtrujill-dev
        field_selectors:
          - status.phase=Running
      register: pod_list

    - name: Add pods to inventory
      ansible.builtin.add_host:
        name: "{{ item.metadata.name }}"
        group: "ocp_pods"
        ansible_connection: kubernetes.core.kubectl
        ansible_kubectl_namespace: "{{ item.metadata.namespace }}"
        ansible_host: "{{ item.metadata.name }}"
      loop: "{{ pod_list.resources }}"

- name: Test Connections with Raw Module
  hosts: ocp_pods
  gather_facts: false  # REQUIRED: Gathering facts needs a temp directory
  tasks:
    - name: Run a direct command without using temp space
      ansible.builtin.raw: hostname
      register: raw_output

    - name: Show Pod Hostname
      ansible.builtin.debug:
        msg: "Successfully bypassed temp directory on pod: {{ raw_output.stdout_lines[0] }}"
